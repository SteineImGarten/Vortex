name: Update Features Manifest

on:
  push:
    branches:
      - main # Change this if your default branch is named 'master'
    paths:
      - 'src/features/**.lua' # Triggers only when .lua files inside src/features change

permissions:
  contents: write # Crucial: Allows the runner to commit changes back to your repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Generate Manifest JSON
      run: |
        cd src/features
        echo "[" > manifest.json
        
        # Loop through all .lua files, excluding init.lua if it exists
        first=true
        for f in *.lua; do
          if [ "$f" != "init.lua" ] && [ -f "$f" ]; then
            name="${f%.lua}"
            if [ "$first" = true ]; then
              printf "  \"%s\"" "$name" >> manifest.json
              first=false
            else
              printf ",\n  \"%s\"" "$name" >> manifest.json
            fi
          fi
        done
        
        echo -e "\n]" >> manifest.json

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add src/features/manifest.json
        
        # Only commit and push if the manifest actually changed
        if git diff --staged --quiet; then
          echo "No changes to manifest.json"
        else
          git commit -m "auto: update features manifest"
          git push
        fi
